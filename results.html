<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的成绩 · 优益思达国际课程中心</title>
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/style.css?v=20260702-logo">
</head>
<body class="home-minimal">

  <header class="minimal-topbar">
    <div class="minimal-shell minimal-topbar__inner">
      <a href="index.html" class="minimal-brand" aria-label="优益思达国际课程中心首页">
        <img src="assets/img/logo.svg?v=20260702-logo" alt="" class="minimal-brand__logo">
        <span class="minimal-brand__text">
          <b>优益思达国际课程中心</b>
          <span>YYSD International Course Center</span>
        </span>
      </a>
      <nav class="minimal-nav" id="nav" aria-label="主导航">
        <a href="zone.html?zone=study">学习区</a>
        <a href="zone.html?zone=practice">练习区</a>
        <a href="zone.html?zone=mock">模考区</a>
        <a href="results.html" class="is-active">我的成绩</a>
        <a href="admin/index.html">管理后台</a>
      </nav>
    </div>
  </header>

  <section class="minimal-shell minimal-page-head">
    <div class="minimal-crumb"><a href="index.html">首页</a> / 我的成绩</div>
    <div class="minimal-eyebrow">RESULTS</div>
    <h1>我的成绩</h1>
    <p class="minimal-page-desc">记录保存在本浏览器中。完成模考或练习并交卷后，成绩会自动出现在这里。</p>
  </section>

  <main class="minimal-shell minimal-main">
    <div class="section__head section__head--actions">
      <button class="btn btn--ghost btn--sm" id="clear-btn">清空记录</button>
    </div>
    <div id="results-area"></div>
  </main>

  <footer class="minimal-shell minimal-footer">
    © <span id="year"></span> 优益思达国际课程中心 · YYSD International Course Center
  </footer>

  <script src="assets/js/config.js?v=20260702-logo"></script>
  <script>
  (function () {
    var Y = window.YYSD;
    var area = document.getElementById("results-area");

    function render() {
      var store = Y.results();
      var rows = Object.keys(store).map(function (k) { return store[k]; })
        .sort(function (a, b) { return String(b.date).localeCompare(String(a.date)); });

      if (!rows.length) {
        area.innerHTML = '<div class="state"><h3>还没有成绩记录</h3>' +
          '<p>去完成一份模考或练习吧，交卷后成绩会自动记录在这里。</p>' +
          '<p style="margin-top:14px"><a class="btn btn--primary btn--sm" href="index.html">前往学习中心 →</a></p></div>';
        return;
      }

      var html = '<div class="table-wrap"><table class="data"><thead><tr>' +
        '<th>内容</th><th>板块</th><th>科目</th><th>得分</th><th>等级</th><th>完成时间</th><th></th>' +
        '</tr></thead><tbody>';
      rows.forEach(function (r) {
        var score = (r.score != null) ? (r.score + (r.total != null ? " / " + r.total : "")) : "—";
        var date = r.date ? new Date(r.date).toLocaleString("zh-CN") : "—";
        var zone = (Y.ZONE[r.zone] || {}).label || "—";
        var subj = (Y.SUBJECT[r.subject] || {}).label || "—";
        html += '<tr>' +
          '<td><b>' + Y.esc(r.title) + '</b></td>' +
          '<td>' + Y.esc(zone) + '</td>' +
          '<td>' + Y.esc(subj) + '</td>' +
          '<td><span class="score-pill">' + Y.esc(score) + '</span></td>' +
          '<td>' + (r.band != null ? Y.esc(r.band) : "—") + '</td>' +
          '<td>' + Y.esc(date) + '</td>' +
          '<td><a class="btn btn--ghost btn--sm" href="exam.html?id=' + encodeURIComponent(r.id) + '">重做</a></td>' +
          '</tr>';
      });
      html += '</tbody></table></div>';
      area.innerHTML = html;
    }

    document.getElementById("clear-btn").addEventListener("click", function () {
      if (confirm("确定清空全部成绩记录吗？此操作不可撤销。")) {
        localStorage.removeItem("yysd:results"); render();
      }
    });

    document.getElementById("year").textContent = new Date().getFullYear();
    render();
  })();
  </script>
</body>
</html>

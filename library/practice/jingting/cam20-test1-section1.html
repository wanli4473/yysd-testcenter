<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听力精听：剑雅20 Test 1 · Section 1（口语复述）</title>

<!-- 学习中心元数据 -->
<meta name="exam:title"       content="听力精听：剑雅20 Test 1 · Section 1（口语复述）">
<meta name="exam:zone"        content="practice">
<meta name="exam:subject"     content="jingting">
<meta name="exam:duration"    content="0">
<meta name="exam:description" content="一句一句听，对着麦克风复述，AI 判断主谓宾与语法；通过后翻译句子。原文可随时显示/隐藏。">

<style>
  :root{ --red:#c8102e; --navy:#14213d; --ink:#1f2a3a; --muted:#667085; --line:#e4e8ef;
         --green:#1e9e6a; --amber:#b9770b; --bg:#f3f5f8; --purple:#534ab7; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; color:var(--ink);
        background:var(--bg); line-height:1.7; }
  .wrap{ max-width:820px; margin:0 auto; padding:22px 18px 60px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:22px; margin-bottom:18px; }
  h1{ font-size:21px; color:var(--navy); margin:0 0 4px; }
  .lead{ color:var(--muted); margin:0 0 4px; font-size:14px; }

  /* sentence list */
  .layout{ display:grid; grid-template-columns:200px 1fr; gap:18px; }
  @media(max-width:680px){ .layout{ grid-template-columns:1fr; } }
  .list{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:10px; height:max-content; }
  .list h3{ font-size:13px; color:var(--muted); margin:6px 8px 10px; font-weight:600; letter-spacing:.03em; }
  .sent-item{ display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:9px; cursor:pointer;
              font-size:14px; color:var(--ink); }
  .sent-item:hover{ background:#f4f6fb; }
  .sent-item.active{ background:#eef0fb; color:var(--purple); font-weight:600; }
  .sent-item .dot{ width:9px; height:9px; border-radius:50%; background:#cfd6e4; flex:0 0 auto; }
  .sent-item.done .dot{ background:var(--green); }
  .sent-item.active .dot{ background:var(--purple); }

  /* controls */
  .row{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
  .btn{ background:var(--red); color:#fff; border:0; border-radius:10px; padding:11px 20px; font-size:15px;
        font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
  .btn:hover{ filter:brightness(1.05); }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }
  .btn.ghost{ background:#fff; color:var(--ink); border:1px solid var(--line); font-weight:600; }
  .btn.rec{ background:var(--purple); }
  .btn.rec.on{ background:#a32d2d; animation:pulse 1.1s infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(163,45,45,.4);} 50%{ box-shadow:0 0 0 8px rgba(163,45,45,0);} }
  .toggle{ font-size:14px; color:var(--purple); cursor:pointer; user-select:none; }

  .stage-tag{ display:inline-block; font-size:12px; font-weight:700; padding:3px 10px; border-radius:20px;
              background:#eef0fb; color:var(--purple); margin-bottom:10px; }

  .transcript{ background:#f7f9fc; border:1px dashed var(--line); border-radius:10px; padding:18px;
               min-height:64px; font-size:17px; text-align:center; color:var(--ink); }
  .transcript.hidden-text{ color:var(--purple); cursor:pointer; font-size:15px; }

  .heard{ background:#fff; border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-top:12px;
          font-size:15px; color:var(--ink); min-height:46px; }
  .heard .ph{ color:var(--muted); }

  .verdict{ margin-top:12px; border-radius:10px; padding:13px 15px; font-size:14.5px; display:none; }
  .verdict.show{ display:block; }
  .verdict.ok{ background:#e9f8f1; border:1px solid #b9e6d2; color:#14633f; }
  .verdict.no{ background:#fdecec; border:1px solid #f3c9c9; color:#9a2828; }
  .verdict b{ font-weight:700; }
  .chips{ margin-top:8px; display:flex; gap:8px; flex-wrap:wrap; }
  .chip{ font-size:12.5px; padding:3px 10px; border-radius:20px; background:#fff; border:1px solid var(--line); }
  .chip.y{ color:#14633f; border-color:#b9e6d2; background:#e9f8f1; }
  .chip.n{ color:#9a2828; border-color:#f3c9c9; background:#fdecec; }

  textarea{ width:100%; border:1px solid var(--line); border-radius:10px; padding:12px; font-size:15px;
            font-family:inherit; resize:vertical; min-height:64px; }
  .hint{ font-size:12.5px; color:var(--muted); margin-top:6px; }
  .mode-banner{ font-size:12.5px; background:#fff7e6; border:1px solid #f3e0b3; color:#8a6500;
                border-radius:8px; padding:7px 11px; margin-bottom:14px; }
  .sr-note{ font-size:12.5px; color:var(--muted); margin-top:10px; }
  .divider{ height:1px; background:var(--line); margin:16px 0; }
</style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <h1>听力精听 · 口语复述训练</h1>
    <p class="lead">剑雅20 Test 1 — Section 1</p>
    <div id="modeBanner" class="mode-banner"></div>
  </div>

  <div class="layout">
    <!-- sentence list -->
    <aside class="list">
      <h3>句子列表</h3>
      <div id="sentList"></div>
    </aside>

    <!-- main stage -->
    <section>
      <!-- Stage 1: listen + repeat -->
      <div class="card" id="stageRepeat">
        <span class="stage-tag">第 1 步 · 听 & 复述</span>
        <div class="row" style="margin-bottom:12px;">
          <button class="btn" id="playBtn">▶ 播放例句</button>
          <span class="toggle" id="toggleText">👁 显示原文</span>
        </div>

        <div class="transcript hidden-text" id="transcript">点击「显示原文」查看英文（建议先盲听）</div>

        <div class="divider"></div>

        <div class="row">
          <button class="btn rec" id="recBtn">🎙 按住说 / 点击开始复述</button>
          <button class="btn ghost" id="stopBtn" disabled>■ 停止</button>
        </div>
        <div class="heard" id="heard"><span class="ph">你复述的内容会显示在这里…</span></div>

        <div class="verdict" id="verdict"></div>
        <p class="sr-note" id="srNote"></p>
      </div>

      <!-- Stage 2: translate (hidden until pass) -->
      <div class="card" id="stageTranslate" style="display:none;">
        <span class="stage-tag" style="background:#e1f5ee;color:#0f6e56;">第 2 步 · 翻译这句话</span>
        <p class="lead" id="translatePrompt"></p>
        <textarea id="zhInput" placeholder="在这里输入这句话的中文翻译…"></textarea>
        <div class="row" style="margin-top:10px;">
          <button class="btn" id="checkZhBtn">提交翻译</button>
          <button class="btn ghost" id="nextBtn" style="display:none;">下一句 →</button>
        </div>
        <div class="verdict" id="zhVerdict"></div>
      </div>
    </section>
  </div>
</div>

<script>
/* ============================================================
   配置：服务器后端地址。配好阿里云 https 后，把下面改成
   你的服务器地址（例如 "https://47.100.160.186"）。
   留空 "" = 本地体验模式（不连服务器，用简单规则演示流程）。
   ============================================================ */
var API_BASE = "";   // ← 接好服务器后改成 "https://你的服务器地址"

/* ---- 例句数据（demo 先放 1 句，以后可继续往数组里加）---- */
var SENTENCES = [
  {
    en: "I'd like to find out some information about cookery classes.",
    zh: "我想了解一些关于烹饪课程的信息。",
    subject: "I", verb: "like (find out)", object: "information about cookery classes"
  }
];

var cur = 0;
var done = [];

/* ---------- 渲染句子列表 ---------- */
var sentList = document.getElementById('sentList');
function renderList(){
  sentList.innerHTML = SENTENCES.map(function(s, i){
    return '<div class="sent-item '+(i===cur?'active':'')+(done[i]?' done':'')+'" data-i="'+i+'">'
         + '<span class="dot"></span>第 '+(i+1)+' 句</div>';
  }).join('');
  Array.prototype.forEach.call(sentList.querySelectorAll('.sent-item'), function(el){
    el.onclick = function(){ goTo(+el.dataset.i); };
  });
}
function goTo(i){ cur = i; resetStage(); renderList(); }

/* ---------- 显示/隐藏原文 ---------- */
var transcript = document.getElementById('transcript');
var textShown = false;
function paintTranscript(){
  if(textShown){
    transcript.classList.remove('hidden-text');
    transcript.textContent = SENTENCES[cur].en;
  } else {
    transcript.classList.add('hidden-text');
    transcript.textContent = '点击「显示原文」查看英文（建议先盲听）';
  }
}
document.getElementById('toggleText').onclick = function(){
  textShown = !textShown;
  this.textContent = textShown ? '🙈 隐藏原文' : '👁 显示原文';
  paintTranscript();
};
transcript.onclick = function(){ if(!textShown) document.getElementById('toggleText').click(); };

/* ---------- 播放例句（用浏览器朗读，无需音频文件）---------- */
document.getElementById('playBtn').onclick = function(){
  try{
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(SENTENCES[cur].en);
    u.lang = 'en-US'; u.rate = 0.92;
    window.speechSynthesis.speak(u);
  }catch(e){ alert('当前浏览器不支持朗读，请换 Chrome。'); }
};

/* ---------- 录音 / 语音识别（浏览器，英文）---------- */
var heard = document.getElementById('heard');
var verdict = document.getElementById('verdict');
var srNote = document.getElementById('srNote');
var recBtn = document.getElementById('recBtn');
var stopBtn = document.getElementById('stopBtn');
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
var recog = null, lastHeard = '';

if(!SR){
  srNote.textContent = '⚠️ 当前浏览器不支持语音识别，请用电脑版 Chrome 打开。';
  recBtn.disabled = true;
}

function startRec(){
  if(!SR) return;
  lastHeard = '';
  heard.innerHTML = '<span class="ph">🎙 正在听… 请清晰地说出这句话</span>';
  verdict.classList.remove('show');
  recog = new SR();
  recog.lang = 'en-US'; recog.interimResults = true; recog.maxAlternatives = 1;
  recog.onresult = function(ev){
    var txt = '';
    for(var i=0;i<ev.results.length;i++) txt += ev.results[i][0].transcript;
    lastHeard = txt.trim();
    heard.textContent = lastHeard || '…';
  };
  recog.onerror = function(ev){ srNote.textContent = '识别出错：'+ev.error+'（请检查麦克风权限）'; };
  recog.onend = function(){ recBtn.classList.remove('on'); stopBtn.disabled = true; recBtn.disabled = false;
                            if(lastHeard) judge(lastHeard); };
  recog.start();
  recBtn.classList.add('on'); recBtn.disabled = true; stopBtn.disabled = false;
}
function stopRec(){ if(recog) recog.stop(); }
recBtn.onclick = startRec;
stopBtn.onclick = stopRec;

/* ---------- 判断主谓宾 + 语法 ---------- */
function judge(text){
  verdict.className = 'verdict show';
  verdict.innerHTML = '⏳ 正在判断主谓宾与语法…';
  var s = SENTENCES[cur];

  if(API_BASE){
    fetch(API_BASE + '/api/jingting/judge', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ heard:text, target:s.en })
    }).then(function(r){ return r.json(); })
      .then(function(d){ showVerdict(d); })
      .catch(function(){ showVerdict(localJudge(text, s)); verdict.innerHTML += '<div class="hint">（未连上服务器，已用本地规则判断）</div>'; });
  } else {
    showVerdict(localJudge(text, s));
  }
}

/* 本地体验模式：用简单规则近似判断（接服务器后由 AI 取代）*/
function localJudge(text, s){
  var t = text.toLowerCase().replace(/[^a-z' ]/g,' ');
  function has(w){ return t.indexOf(w.toLowerCase()) > -1; }
  var subj = has(" i ") || t.indexOf("i ")===0 || has("i'd") || has("i would");
  var verb = has("like") || has("find") || has("want");
  var obj  = has("information") || has("cookery") || has("class");
  var grammar = text.trim().split(/\s+/).length >= 4;
  return { subject:subj, verb:verb, object:obj, grammar:grammar,
           pass:(subj&&verb&&obj&&grammar),
           comment: (subj&&verb&&obj) ? '主谓宾齐全，语法基本正确。' : '没有完全捕捉到主谓宾，再听一遍试试。' };
}

function showVerdict(d){
  var pass = d.pass;
  verdict.className = 'verdict show ' + (pass ? 'ok' : 'no');
  verdict.innerHTML =
    '<b>'+(pass ? '✅ 通过！' : '❌ 再试一次')+'</b> '+ (d.comment||'') +
    '<div class="chips">'+
      chip('主语', d.subject)+ chip('谓语', d.verb)+ chip('宾语', d.object)+ chip('语法', d.grammar)+
    '</div>';
  if(pass){ openTranslate(); markDone(); }
}
function chip(label, ok){ return '<span class="chip '+(ok?'y':'n')+'">'+label+'：'+(ok?'✓':'✗')+'</span>'; }

/* ---------- 第 2 步：翻译 ---------- */
var stageTranslate = document.getElementById('stageTranslate');
var zhVerdict = document.getElementById('zhVerdict');
function openTranslate(){
  stageTranslate.style.display = '';
  document.getElementById('translatePrompt').textContent = '英文原句：' + SENTENCES[cur].en;
  document.getElementById('zhInput').value = '';
  zhVerdict.classList.remove('show');
  document.getElementById('nextBtn').style.display = SENTENCES.length>1 ? '' : 'none';
  stageTranslate.scrollIntoView({behavior:'smooth'});
}
document.getElementById('checkZhBtn').onclick = function(){
  var zh = document.getElementById('zhInput').value.trim();
  if(!zh){ return; }
  zhVerdict.className = 'verdict show';
  zhVerdict.innerHTML = '⏳ 正在批改翻译…';
  var s = SENTENCES[cur];
  if(API_BASE){
    fetch(API_BASE + '/api/jingting/translate', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ en:s.en, zh:zh, reference:s.zh })
    }).then(function(r){ return r.json(); })
      .then(function(d){ showZh(d); })
      .catch(function(){ showZh(localZh(zh,s)); });
  } else { showZh(localZh(zh,s)); }
};
function localZh(zh, s){
  var ok = zh.length >= 4;
  return { pass:ok, comment: ok ? '翻译大意正确。参考译文：'+s.zh : '翻译太短了，请完整翻译。' };
}
function showZh(d){
  zhVerdict.className = 'verdict show ' + (d.pass ? 'ok' : 'no');
  zhVerdict.innerHTML = '<b>'+(d.pass?'✅ 翻译不错':'✏️ 再改改')+'</b> '+(d.comment||'');
}
document.getElementById('nextBtn').onclick = function(){
  if(cur < SENTENCES.length-1) goTo(cur+1);
};

/* ---------- 进度 / 重置 ---------- */
function markDone(){ done[cur] = true; renderList(); }
function resetStage(){
  textShown = false; document.getElementById('toggleText').textContent = '👁 显示原文'; paintTranscript();
  heard.innerHTML = '<span class="ph">你复述的内容会显示在这里…</span>';
  verdict.classList.remove('show'); srNote.textContent = '';
  stageTranslate.style.display = 'none';
}

/* ---------- 初始化 ---------- */
document.getElementById('modeBanner').textContent = API_BASE
  ? '已连接 AI 服务器：将由 AI 判断主谓宾、语法并批改翻译。'
  : '当前为「本地体验模式」：可完整体验流程，但主谓宾/语法/翻译判断为简易规则。接好阿里云服务器后将由 AI 智能判断。';
renderList(); resetStage();
</script>
</body>
</html>
